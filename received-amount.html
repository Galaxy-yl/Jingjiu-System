<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <title>实收金额明细 · 劲酒配送管家</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0e7490">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="劲酒配送">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/app-shell.css">
    <link rel="stylesheet" href="css/page-decor.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#0284c7',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        @media (max-width: 900px) {
            #receivedList .app-table-scroll {
                overflow-x: visible;
            }
            #receivedList .app-table {
                min-width: 100%;
                table-layout: fixed;
            }
            #receivedList .app-table thead th,
            #receivedList .app-table tbody td {
                padding: 8px 6px;
                font-size: 12px;
                word-break: break-all;
            }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen app-body-bg no-page-decor">
    <header class="app-topbar sticky top-0 z-40 text-white">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 py-3.5">
            <div class="flex items-center gap-3 min-w-0">
                <button type="button" onclick="goBack()" class="min-h-[44px] min-w-[44px] inline-flex items-center justify-center rounded-xl hover:bg-white/15 transition-colors shrink-0" aria-label="返回">
                    <i class="fas fa-arrow-left text-lg"></i>
                </button>
                <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-white/10 ring-1 ring-white/20">
                    <i class="fas fa-wallet text-sm"></i>
                </span>
                <h1 class="text-lg font-bold truncate">实收金额</h1>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        <div class="app-panel p-4 sm:p-6 mb-5">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-violet-100 text-violet-700">
                    <i class="fas fa-wallet text-sm"></i>
                </span>
                实收金额明细
            </h2>
        </div>

        <div class="app-panel p-4 mb-5">
            <label class="block text-sm font-medium text-slate-600 mb-2"><i class="fas fa-search mr-1 text-cyan-600"></i> 搜索</label>
            <input type="search" id="receivedSearch" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-white text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/35 focus:border-cyan-400" placeholder="商家名称、联系人或电话" autocomplete="off">
        </div>

        <div id="receivedList">
            <div class="text-center py-12 text-gray-500">
                <i class="fas fa-wallet text-6xl mb-4 opacity-30"></i>
                <p>暂无实收金额记录</p>
            </div>
        </div>
    </div>

    <script src="js/mian1-shared.js"></script>
    <script>
        const API_BASE_URL = Mian1.getApiBase();
        let currentArea = '';
        let selectedDate = '';
        let cachedReceivedStores = [];

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentArea = urlParams.get('area') || 'A';
            selectedDate = urlParams.get('date') || '';
            const searchEl = document.getElementById('receivedSearch');
            if (searchEl) searchEl.addEventListener('input', () => applyReceivedSearch());
            loadReceivedAmount();
        });

        function applyReceivedSearch() {
            const el = document.getElementById('receivedSearch');
            const q = el ? el.value : '';
            renderReceivedAmount(Mian1.filterStoresBySearch(cachedReceivedStores, q));
        }

        async function getStores() {
            const response = await fetch(`${API_BASE_URL}/merchants${currentArea && currentArea !== 'all' ? `?area=${currentArea}` : ''}`);
            return response.json();
        }

        async function loadReceivedAmount() {
            const today = new Date().toISOString().split('T')[0];
            let stores = [];

            // 历史日期：从本地全量快照读取
            if (selectedDate && selectedDate !== today) {
                stores = await Mian1.getBestSnapshot(selectedDate);
                if (currentArea && currentArea !== 'all') {
                    stores = stores.filter(s => s.area === currentArea);
                }
            } else {
                // 今天：从后端读取
                stores = await getStores();
            }

            const receivedStores = stores.filter(s => {
                if (selectedDate) {
                    const belongsToDay = s.paymentDate
                        ? s.paymentDate === selectedDate
                        : (s.deliveryDate === selectedDate);
                    if (!belongsToDay) return false;
                }

                const total =
                    (parseFloat(s.wechatAmount) || 0) +
                    (parseFloat(s.alipayAmount) || 0) +
                    (parseFloat(s.cardAmount) || 0) +
                    (parseFloat(s.cashAmount) || 0) +
                    (parseFloat(s.receivedAmount) || 0); // peisong.html 的“实收金额”使用 receivedAmount

                return total > 0;
            });
            cachedReceivedStores = receivedStores;
            applyReceivedSearch();
        }

        function renderReceivedAmount(stores) {
            const listEl = document.getElementById('receivedList');
            const isMobile = window.matchMedia('(max-width: 900px)').matches;
            
            if (cachedReceivedStores.length === 0 && stores.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-wallet text-6xl mb-4 opacity-30"></i>
                        <p>暂无实收金额记录</p>
                    </div>
                `;
                return;
            }
            if (stores.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-search text-6xl mb-4 opacity-30"></i>
                        <p>暂无匹配商家，请调整搜索关键词</p>
                    </div>
                `;
                return;
            }

            let totalAll = 0;
            let wechatTotal = 0;
            let alipayTotal = 0;
            let cardTotal = 0;
            let cashTotal = 0;
            
            const rows = stores.map(store => {
                const wechat = parseFloat(store.wechatAmount) || 0;
                const alipay = parseFloat(store.alipayAmount) || 0;
                const card = parseFloat(store.cardAmount) || 0;
                const cash = parseFloat(store.cashAmount) || 0;
                const received = parseFloat(store.receivedAmount) || 0;
                const total = wechat + alipay + card + cash + received;
                
                totalAll += total;
                wechatTotal += wechat;
                alipayTotal += alipay;
                cardTotal += card;
                cashTotal += cash;
                
                if (isMobile) {
                    return `
                        <tr>
                            <td>${store.name}</td>
                            <td>${store.paymentDate || store.deliveryDate || '-'}</td>
                            <td>${store.paymentOrigin || '-'}</td>
                            <td>¥${total.toFixed(2)}</td>
                        </tr>
                    `;
                }
                return `
                    <tr>
                        <td>${store.name}</td>
                        <td>${store.contact || '-'}</td>
                        <td>${store.phone || '-'}</td>
                        <td>${store.paymentDate || store.deliveryDate || '-'}</td>
                        <td>${store.paymentOrigin || '-'}</td>
                        <td>¥${wechat.toFixed(2)}</td>
                        <td>¥${alipay.toFixed(2)}</td>
                        <td>¥${card.toFixed(2)}</td>
                        <td>¥${cash.toFixed(2)}</td>
                        <td class="font-semibold text-cyan-700">¥${total.toFixed(2)}</td>
                    </tr>
                `;
            }).join('');

            listEl.innerHTML = `
                <div class="app-table-wrap animate-fade-in">
                    <div class="app-table-scroll">
                        <table class="app-table">
                            <thead>
                                ${isMobile ? `
                                <tr>
                                    <th>商家</th>
                                    <th>日期</th>
                                    <th>来源</th>
                                    <th>合计</th>
                                </tr>` : `
                                <tr>
                                    <th>商家</th>
                                    <th>联系人</th>
                                    <th>电话</th>
                                    <th>日期</th>
                                    <th>来源</th>
                                    <th>微信</th>
                                    <th>支付宝</th>
                                    <th>信用卡</th>
                                    <th>现金</th>
                                    <th>合计</th>
                                </tr>`}
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
                <div class="mt-3 app-panel p-4">
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm">
                        <div>微信：<strong>¥${wechatTotal.toFixed(2)}</strong></div>
                        <div>支付宝：<strong>¥${alipayTotal.toFixed(2)}</strong></div>
                        <div>信用卡：<strong>¥${cardTotal.toFixed(2)}</strong></div>
                        <div>现金：<strong>¥${cashTotal.toFixed(2)}</strong></div>
                        <div>总计：<strong class="text-cyan-700">¥${totalAll.toFixed(2)}</strong></div>
                    </div>
                </div>
            `;
        }

        function goBack() {
            Mian1.navigateBackToPeisong();
        }
    </script>
    <script src="js/app-shell-init.js" defer></script>
    <script src="js/pwa-bootstrap.js" defer></script>
</body>
</html>
