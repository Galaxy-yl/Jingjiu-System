<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <title>欠账商家 · 劲酒配送管家</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0e7490">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="劲酒配送">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/app-shell.css">
    <link rel="stylesheet" href="css/page-decor.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#0284c7',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        #owingList .app-table {
            min-width: 100%;
            table-layout: fixed;
        }
        #owingList .app-table thead th {
            font-size: 14px;
            text-align: center;
            background: #eef6fb;
        }
        #owingList .app-table tbody td {
            font-size: 15px;
            padding-top: 14px;
            padding-bottom: 14px;
            vertical-align: middle;
        }
        #owingList .app-table tbody td:nth-child(1) {
            width: 30%;
            font-weight: 600;
            color: #0f172a;
        }
        #owingList .app-table tbody td:nth-child(2) {
            width: 18%;
            text-align: center;
            font-weight: 700;
            color: #0f766e;
        }
        #owingList .app-table tbody td:nth-child(3) {
            width: 18%;
            text-align: center;
            color: #334155;
        }
        #owingList .app-table tbody td:nth-child(4) {
            width: 34%;
        }
        #owingList .pay-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 16px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        #owingList .pay-grid label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #1f2937;
            white-space: nowrap;
        }
        #owingList .btn-paid {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: #16a34a;
        }
        #owingList .btn-paid:hover {
            background: #15803d;
        }
        @media (max-width: 900px) {
            #owingList .app-table-scroll {
                overflow-x: visible;
            }
            #owingList .app-table {
                min-width: 100%;
                table-layout: fixed;
            }
            #owingList .app-table thead th,
            #owingList .app-table tbody td {
                padding: 8px 6px;
                font-size: 12px;
                word-break: break-all;
            }
            #owingList .row-actions {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            #owingList .row-actions button {
                width: 100%;
            }
            #owingList .pay-methods {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px 8px;
            }
            #owingList .btn-paid {
                font-size: 12px;
                padding: 7px 8px;
            }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen app-body-bg no-page-decor">
    <header class="app-topbar sticky top-0 z-40 text-white">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 py-3.5">
            <div class="flex items-center gap-3 min-w-0">
                <button type="button" onclick="goBack()" class="min-h-[44px] min-w-[44px] inline-flex items-center justify-center rounded-xl hover:bg-white/15 transition-colors shrink-0" aria-label="返回">
                    <i class="fas fa-arrow-left text-lg"></i>
                </button>
                <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-white/10 ring-1 ring-white/20">
                    <i class="fas fa-exclamation-triangle text-sm"></i>
                </span>
                <h1 class="text-lg font-bold truncate">欠账</h1>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        <div class="app-panel p-4 sm:p-6 mb-5">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-orange-100 text-orange-700">
                    <i class="fas fa-exclamation-triangle text-sm"></i>
                </span>
                欠账商家
            </h2>
        </div>

        <div class="app-panel p-4 mb-5">
            <label class="block text-sm font-medium text-slate-600 mb-2"><i class="fas fa-search mr-1 text-cyan-600"></i> 搜索</label>
            <input type="search" id="owingSearch" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-white text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/35 focus:border-cyan-400" placeholder="商家名称、联系人或电话" autocomplete="off">
            <p class="text-xs text-gray-500 mt-2">欠账开始日早于今日的会<span class="text-red-600 font-medium">标红</span>提醒。</p>
        </div>

        <div id="owingList">
            <div class="text-center py-12 text-gray-500">
                <i class="fas fa-check-circle text-6xl mb-4 opacity-30"></i>
                <p>暂无欠账商家</p>
            </div>
        </div>
    </div>

    <script src="js/mian1-shared.js"></script>
    <script>
        const API_BASE_URL = Mian1.getApiBase();
        let currentArea = '';
        let selectedDate = '';
        let isHistory = false;
        let cachedOwingStores = [];

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentArea = urlParams.get('area') || 'A';
            selectedDate = urlParams.get('date') || '';
            const today = new Date().toISOString().split('T')[0];
            isHistory = !!(selectedDate && selectedDate !== today);
            const se = document.getElementById('owingSearch');
            if (se) se.addEventListener('input', () => applyOwingSearch());
            loadOwingStores();
        });

        function applyOwingSearch() {
            const el = document.getElementById('owingSearch');
            const q = el ? el.value : '';
            renderOwingStores(Mian1.filterStoresBySearch(cachedOwingStores, q));
        }

        async function getStores() {
            const response = await fetch(`${API_BASE_URL}/merchants${currentArea && currentArea !== 'all' ? `?area=${currentArea}` : ''}`);
            return response.json();
        }

        function getDaysDifference(date1, date2) {
            const d1 = new Date(date1);
            const d2 = new Date(date2);
            const diffTime = Math.abs(d2 - d1);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN');
        }

        function showHistoryReadonlyMessage() {
            alert(`当前查看的是 ${selectedDate} 的历史数据，只能查看，不能修改。`);
        }

        async function loadOwingStores() {
            let stores = [];
            if (isHistory) {
                stores = await Mian1.getBestSnapshot(selectedDate);
                if (currentArea && currentArea !== 'all') {
                    stores = stores.filter(s => s.area === currentArea);
                }
            } else {
                stores = await getStores();
            }
            const owingStores = stores.filter(s => s.isOwing);
            cachedOwingStores = owingStores;
            applyOwingSearch();
        }

        function renderOwingStores(stores) {
            const listEl = document.getElementById('owingList');
            const viewDay = isHistory ? selectedDate : new Date().toISOString().split('T')[0];
            const isMobile = window.matchMedia('(max-width: 900px)').matches;
            
            if (cachedOwingStores.length === 0 && stores.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-check-circle text-6xl mb-4 opacity-30"></i>
                        <p>暂无欠账商家</p>
                    </div>
                `;
                return;
            }
            if (stores.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-search text-6xl mb-4 opacity-30"></i>
                        <p>暂无匹配商家，请调整搜索关键词</p>
                    </div>
                `;
                return;
            }

            let totalOwing = 0;
            stores.forEach(s => { totalOwing += parseFloat(s.amount) || 0; });
            const rows = stores.map(store => {
                const owingAmount = parseFloat(store.amount) || 0;
                
                const startDay = (store.owingStartDate || store.createdAt || '').toString().slice(0, 10);
                const isStale = !!(startDay && startDay < viewDay);
                const oldClass = isStale ? 'border-red-500 bg-red-50' : '';
                
                if (isMobile) {
                    return `
                        <tr class="${isStale ? 'is-alert' : ''}">
                            <td>${store.name}</td>
                            <td>¥${owingAmount.toFixed(2)}</td>
                            <td>${startDay || '-'}</td>
                            <td>
                                <div class="pay-methods text-xs">
                                    <label><input type="radio" name="owingPay_${store.id}" value="wechat" checked> 微信</label>
                                    <label><input type="radio" name="owingPay_${store.id}" value="alipay"> 支付宝</label>
                                    <label><input type="radio" name="owingPay_${store.id}" value="card"> 信用卡</label>
                                    <label><input type="radio" name="owingPay_${store.id}" value="cash"> 现金</label>
                                </div>
                                <div class="row-actions mt-1">
                                    <button onclick="markPaid(${store.id})" class="btn-paid">已付款</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
                return `
                    <tr class="${isStale ? 'is-alert' : ''}">
                        <td>${store.name}</td>
                        <td>
                            ¥${owingAmount.toFixed(2)}
                        </td>
                        <td>${startDay || '-'}</td>
                        <td>
                            <div class="pay-grid">
                                <label><input type="radio" name="owingPay_${store.id}" value="wechat" checked> 微信</label>
                                <label><input type="radio" name="owingPay_${store.id}" value="alipay"> 支付宝</label>
                                <label><input type="radio" name="owingPay_${store.id}" value="card"> 信用卡</label>
                                <label><input type="radio" name="owingPay_${store.id}" value="cash"> 现金</label>
                            </div>
                            <button onclick="markPaid(${store.id})" class="btn-paid">已付款</button>
                        </td>
                    </tr>
                `;
            }).join('');

            listEl.innerHTML = `
                <div class="app-table-wrap animate-fade-in">
                    <div class="app-table-scroll">
                        <table class="app-table">
                            <thead>
                                ${isMobile ? `
                                <tr>
                                    <th>商家</th>
                                    <th>金额</th>
                                    <th>开始日</th>
                                    <th>操作</th>
                                </tr>` : `
                                <tr>
                                    <th>商家</th>
                                    <th>欠账金额</th>
                                    <th>开始日</th>
                                    <th>操作</th>
                                </tr>`}
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
                <div class="mt-3 app-panel p-4 flex justify-between items-center">
                    <span class="font-semibold text-slate-700">欠账金额总计</span>
                    <span class="text-xl font-bold text-orange-600">¥${totalOwing.toFixed(2)}</span>
                </div>
            `;
        }

        function getOwingPayMethod(id) {
            const el = document.querySelector(`input[name="owingPay_${id}"]:checked`);
            const v = el ? el.value : 'wechat';
            return ['wechat', 'alipay', 'card', 'cash'].includes(v) ? v : 'wechat';
        }

        function mergePayMethods(store, methodKey) {
            let m = store.paymentMethods;
            if (typeof m === 'string') {
                try { m = JSON.parse(m); } catch (e) { m = []; }
            }
            if (!Array.isArray(m)) m = [];
            const set = new Set(m);
            set.add(methodKey);
            return Array.from(set);
        }

        async function markPaid(id) {
            if (isHistory) return showHistoryReadonlyMessage();
            const stores = await getStores();
            const store = stores.find(s => s.id === id);
            if (!store) return;

            const method = getOwingPayMethod(id);
            const fieldMap = { wechat: 'wechatAmount', alipay: 'alipayAmount', card: 'cardAmount', cash: 'cashAmount' };
            const field = fieldMap[method] || 'wechatAmount';
            
            const now = new Date().toISOString().split('T')[0];
            const startDate = store.owingStartDate
              ? String(store.owingStartDate).slice(0, 10)
              : (store.createdAt ? String(store.createdAt).slice(0, 10) : '');
            const paymentOrigin = startDate ? `欠账（${startDate}）` : '欠账';

            const owingValue = parseFloat(store.amount) || 0;
            const data = {
                ...store,
                isOwing: 0,
                amount: 0,
                owingAmount: 0,
                owingRemark: '',
                wechatAmount: parseFloat(store.wechatAmount) || 0,
                alipayAmount: parseFloat(store.alipayAmount) || 0,
                cardAmount: parseFloat(store.cardAmount) || 0,
                cashAmount: parseFloat(store.cashAmount) || 0,
            };
            data[field] = (parseFloat(data[field]) || 0) + owingValue;
            data.paymentDate = now;
            data.paymentOrigin = paymentOrigin;
            data.paymentMethods = JSON.stringify(mergePayMethods(store, method));

            try {
                const res = await fetch(`${API_BASE_URL}/merchants/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                Mian1.showToast('已标记付款并计入实收', 'success');
                loadOwingStores();
            } catch (e) {
                console.error(e);
                Mian1.showToast('保存失败，请检查网络与后端', 'error');
            }
        }

        function goBack() {
            Mian1.navigateBackToPeisong();
        }
    </script>
    <script src="js/app-shell-init.js" defer></script>
    <script src="js/pwa-bootstrap.js" defer></script>
</body>
</html>
