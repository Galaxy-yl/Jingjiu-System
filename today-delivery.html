<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <title>今日需送货 · 劲酒配送管家</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0e7490">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="劲酒配送">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/app-shell.css">
    <link rel="stylesheet" href="css/page-decor.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .delivery-kpi {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .delivery-kpi__item {
            border: 1px solid #dbe7ef;
            border-radius: 10px;
            background: #fff;
            padding: 8px 10px;
        }
        .delivery-kpi__label {
            font-size: 11px;
            color: #64748b;
        }
        .delivery-kpi__value {
            margin-top: 2px;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }
        .delivery-mobile-card {
            border: 1px solid #dbe7ef;
            border-radius: 12px;
            background: #fff;
            padding: 10px;
            margin-bottom: 10px;
        }
        .delivery-mobile-card--carry {
            border-color: #fca5a5;
            background: #fff5f5;
        }
        .delivery-mobile-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.35;
        }
        @media (max-width: 900px) {
            .delivery-kpi {
                gap: 6px;
                margin-bottom: 8px;
            }
            .delivery-kpi__item {
                border-radius: 8px;
                padding: 6px 8px;
            }
            .delivery-kpi__label {
                font-size: 10px;
            }
            .delivery-kpi__value {
                font-size: 14px;
            }
            .delivery-mobile-card {
                padding: 8px;
                margin-bottom: 8px;
                border-radius: 10px;
            }
            .delivery-mobile-title {
                font-size: 13px;
                line-height: 1.25;
            }
            .delivery-mobile-card .text-xs {
                font-size: 11px !important;
                line-height: 1.25;
            }
            .delivery-mobile-card input[type='number'],
            .delivery-mobile-card input[type='text'] {
                min-height: 32px;
                padding: 4px 6px;
                font-size: 12px;
            }
            .delivery-mobile-card button {
                min-height: 28px;
                padding: 4px 8px;
                font-size: 11px;
                border-radius: 6px;
            }
        }
    </style>
</head>
<body class="min-h-screen app-body-bg no-page-decor">
    <header class="app-topbar sticky top-0 z-40 text-white">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 py-3.5">
            <div class="flex items-center gap-3 min-w-0">
                <button type="button" id="backButton" class="min-h-[44px] min-w-[44px] inline-flex items-center justify-center rounded-xl hover:bg-white/15 transition-colors shrink-0" aria-label="返回">
                    <i class="fas fa-arrow-left text-lg"></i>
                </button>
                <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-white/10 ring-1 ring-white/20">
                    <i class="fas fa-calendar-check text-sm"></i>
                </span>
                <h1 class="text-lg font-bold truncate">今日需送货</h1>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        <div class="mb-4 flex flex-wrap gap-2 sm:gap-3">
            <button type="button" id="addStoreButton" class="inline-flex min-h-[44px] items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-gradient-to-r from-cyan-600 to-teal-600 text-white text-sm font-semibold shadow-md shadow-cyan-900/15 hover:from-cyan-500 hover:to-teal-500 transition-colors flex-1 sm:flex-initial">
                <i class="fas fa-plus"></i> 新增送货商家
            </button>
            <button type="button" id="paymentButton" class="inline-flex min-h-[44px] items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-white text-cyan-800 text-sm font-semibold border border-cyan-200 shadow-sm hover:bg-cyan-50 transition-colors flex-1 sm:flex-initial">
                <i class="fas fa-qrcode"></i> 收款码
            </button>
        </div>

        <div class="mb-4 app-panel p-4">
            <label class="block text-sm font-medium text-slate-600 mb-2"><i class="fas fa-search mr-1 text-cyan-600"></i> 搜索商家</label>
            <input type="search" id="deliverySearch" class="w-full min-h-[44px] px-4 py-2.5 border border-slate-200 rounded-xl bg-white text-base shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/35 focus:border-cyan-400" placeholder="商家名称、联系人或电话" autocomplete="off">
            <p class="text-xs text-gray-500 mt-2">跨日未送的记录会<span class="text-red-600 font-medium">标红</span>；当日新添加的不标红。</p>
        </div>
        <div id="deliverySummary" class="delivery-kpi"></div>

        <!-- 商家列表 -->
        <div id="deliveryList">
            <div class="text-center py-12 text-gray-500">
                <i class="fas fa-calendar-check text-6xl mb-4 opacity-30"></i>
                <p>今日暂无需要送货的商家</p>
            </div>
        </div>
    </div>

    <!-- 新增模态框 -->
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" id="addModal">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">新增送货商家</h2>
                <button id="closeAddModalButton" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addForm">
                <!-- 单个添加 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">单个添加商家</label>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="min-w-0">
                            <input type="text" id="addName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="商家名称">
                        </div>
                        <div class="min-w-0">
                            <input type="text" id="addContact" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="联系人">
                        </div>
                        <div class="min-w-0">
                            <input type="text" id="addPhone" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="电话">
                        </div>
                    </div>
                </div>
                
                <!-- 批量添加 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">批量添加商家</label>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="min-w-0">
                            <label class="block text-xs text-gray-500 mb-1">商家名称（一行一个）</label>
                            <textarea id="batchAddNames" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="例如：商家A
商家B
商家C"></textarea>
                        </div>
                        <div class="min-w-0">
                            <label class="block text-xs text-gray-500 mb-1">联系人（一行一个）</label>
                            <textarea id="batchAddContacts" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="例如：张三
李四
王五
（留空表示无）"></textarea>
                        </div>
                        <div class="min-w-0">
                            <label class="block text-xs text-gray-500 mb-1">电话（一行一个）</label>
                            <textarea id="batchAddPhones" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="例如：13800138000
13900139000
13700137000
（留空表示无）"></textarea>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="cancelAddButton" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        取消
                    </button>
                    <button type="submit" id="confirmAddButton" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        确定
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 收款码模态框 -->
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" id="paymentModal">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">选择收款方式</h2>
                <button id="closePaymentModalButton" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-4 gap-2">
                    <button id="wechatButton" class="flex flex-col items-center justify-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50">
                        <i class="fab fa-weixin text-green-600 text-2xl mb-1"></i>
                        <span class="text-xs font-medium">微信支付</span>
                    </button>
                    <button id="alipayButton" class="flex flex-col items-center justify-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50">
                        <i class="fab fa-alipay text-blue-600 text-2xl mb-1"></i>
                        <span class="text-xs font-medium">支付宝</span>
                    </button>
                    <button id="cardButton" class="flex flex-col items-center justify-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50">
                        <i class="fas fa-credit-card text-purple-600 text-2xl mb-1"></i>
                        <span class="text-xs font-medium">信用卡</span>
                    </button>
                    <button id="cashButton" class="flex flex-col items-center justify-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50">
                        <i class="fas fa-coins text-yellow-600 text-2xl mb-1"></i>
                        <span class="text-xs font-medium">现金</span>
                    </button>
                </div>
                <div id="qrCodeContainer" class="hidden">
                    <div id="wechatQR" class="hidden">
                        <div class="text-center">
                            <div class="w-full">
                                <img src="images/weixin.png.jpg" alt="微信支付二维码" class="max-w-sm h-auto">
                            </div>
                        </div>
                    </div>
                    <div id="alipayQR" class="hidden">
                        <div class="text-center">
                            <div class="w-full">
                                <img src="images/card.png.jpg" alt="支付宝二维码" class="max-w-sm h-auto">
                            </div>
                        </div>
                    </div>
                    <div id="cardQR" class="hidden">
                        <div class="text-center">
                            <div class="w-full">
                                <img src="images/card.png.jpg" alt="信用卡二维码" class="max-w-sm h-auto">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/mian1-shared.js"></script>
    <script>
        var API_BASE_URL = Mian1.getApiBase();
        var currentArea = 'A';
        var selectedDate = '';
        var isHistory = false;
        var todayStr = new Date().toISOString().split('T')[0];
        var cachedDeliveryStores = [];

        function toastSaveError() {
            Mian1.showToast('保存失败，请检查网络与后端，数据可能未保存', 'error');
        }

        function apiPutMerchant(id, data) {
            return fetch(API_BASE_URL + '/merchants/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(function(res) {
                if (!res.ok) {
                    toastSaveError();
                    return Promise.reject(new Error('HTTP ' + res.status));
                }
                return res;
            });
        }

        function putMerchantAndReload(id, data, showSuccessToast) {
            return apiPutMerchant(id, data).then(function() {
                loadDeliveryStores();
                if (showSuccessToast) {
                    Mian1.showToast('已保存', 'success');
                }
            });
        }

        function showHistoryReadonlyMessage() {
            alert('当前查看的是 ' + selectedDate + ' 的历史数据，只能查看，不能修改');
        }

        function init() {
            try {
                var urlParams = new URLSearchParams(window.location.search);
                currentArea = urlParams.get('area') || 'A';
                selectedDate = urlParams.get('date') || '';
                isHistory = !!(selectedDate && selectedDate !== todayStr);

                // 先绑定按钮事件，再加载数据
                var backButton = document.getElementById('backButton');
                var addStoreButton = document.getElementById('addStoreButton');
                var paymentButton = document.getElementById('paymentButton');
                var closeAddModalButton = document.getElementById('closeAddModalButton');
                var cancelAddButton = document.getElementById('cancelAddButton');
                var closePaymentModalButton = document.getElementById('closePaymentModalButton');
                var wechatButton = document.getElementById('wechatButton');
                var alipayButton = document.getElementById('alipayButton');
                var cardButton = document.getElementById('cardButton');
                var cashButton = document.getElementById('cashButton');
                var addForm = document.getElementById('addForm');
                
                if (backButton) backButton.addEventListener('click', goBack);
                if (addStoreButton) addStoreButton.addEventListener('click', openAddModal);
                if (paymentButton) paymentButton.addEventListener('click', openPaymentModal);
                if (closeAddModalButton) closeAddModalButton.addEventListener('click', closeAddModal);
                if (cancelAddButton) cancelAddButton.addEventListener('click', closeAddModal);
                if (closePaymentModalButton) closePaymentModalButton.addEventListener('click', closePaymentModal);
                if (wechatButton) wechatButton.addEventListener('click', showWechatQR);
                if (alipayButton) alipayButton.addEventListener('click', showAlipayQR);
                if (cardButton) cardButton.addEventListener('click', showCardQR);
                if (cashButton) cashButton.addEventListener('click', closePaymentModal);
                if (addForm) addForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    addDeliveryStore();
                });
                var searchInput = document.getElementById('deliverySearch');
                if (searchInput) {
                    searchInput.addEventListener('input', function() {
                        applyDeliverySearch();
                    });
                }
                
                console.log('按钮事件绑定完成');
            } catch (error) {
                console.error('Error binding button events:', error);
            }
            
            // 然后加载数据
            try {
                loadDeliveryStores();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // 页面加载完成后初始化
        window.onload = init;

        function applyDeliverySearch() {
            var el = document.getElementById('deliverySearch');
            var q = el ? el.value : '';
            var filtered = Mian1.filterStoresBySearch(cachedDeliveryStores, q);
            renderDeliveryStores(filtered, q);
        }

        function getStores() {
            return new Promise(function(resolve, reject) {
                try {
                    var url = API_BASE_URL + '/merchants';
                    if (currentArea && currentArea !== 'all') {
                        url += '?area=' + currentArea;
                    }
                    fetch(url)
                        .then(function(response) {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.json();
                        })
                        .then(function(data) {
                            resolve(data);
                        })
                        .catch(function(error) {
                            console.error('Error fetching stores:', error);
                            resolve([]);
                        });
                } catch (error) {
                    console.error('Error fetching stores:', error);
                    resolve([]);
                }
            });
        }

        function loadDeliveryStores() {
            var handle = function(stores) {
                var deliveryStores = stores.filter(function(s) {
                    return s.needDelivery && !s.delivered;
                });
                cachedDeliveryStores = deliveryStores;
                applyDeliverySearch();
            };

            if (isHistory) {
                Mian1.getBestSnapshot(selectedDate).then(function(stores) {
                    if (currentArea && currentArea !== 'all') {
                        stores = stores.filter(function(s) { return s.area === currentArea; });
                    }
                    handle(stores);
                }).catch(function() {
                    cachedDeliveryStores = [];
                    applyDeliverySearch();
                });
                return;
            }

            getStores().then(handle).catch(function(error) {
                console.error('Error loading delivery stores:', error);
                cachedDeliveryStores = [];
                applyDeliverySearch();
            });
        }

        function getDaysDifference(date1, date2) {
            var d1 = new Date(date1);
            var d2 = new Date(date2);
            var diffTime = Math.abs(d2 - d1);
            var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        function formatDate(dateString) {
            var date = new Date(dateString);
            return date.toLocaleDateString('zh-CN');
        }

        function renderDeliveryStores(stores, searchQuery) {
            var listEl = document.getElementById('deliveryList');
            var summaryEl = document.getElementById('deliverySummary');
            var viewDay = isHistory ? selectedDate : todayStr;
            var isMobile = window.matchMedia('(max-width: 900px)').matches;

            if (cachedDeliveryStores.length === 0 && stores.length === 0) {
                renderDeliverySummary(cachedDeliveryStores);
                listEl.innerHTML = '<div class="text-center py-12 text-gray-500"><i class="fas fa-calendar-check text-6xl mb-4 opacity-30"></i><p>今日暂无需要送货的商家</p></div>';
                return;
            }
            if (stores.length === 0) {
                renderDeliverySummary(stores);
                listEl.innerHTML = '<div class="text-center py-12 text-gray-500"><i class="fas fa-search text-6xl mb-4 opacity-30"></i><p>暂无匹配商家，请调整搜索关键词</p></div>';
                return;
            }

            renderDeliverySummary(stores);

            if (isMobile) {
                var cards = '';
                for (var m = 0; m < stores.length; m++) {
                    var s = stores[m];
                    var cDay = s.createdAt ? String(s.createdAt).slice(0, 10) : '';
                    var carry = !!(cDay && cDay < viewDay);
                    var carryTxt = carry ? ('跨日未送（' + cDay + '）') : '当日';
                    var topBtns = '';
                    if (!isHistory) {
                        topBtns += '<button type="button" onclick="deleteDeliveryMerchant(' + s.id + ')" class="px-3 py-1.5 bg-red-500 text-white text-xs rounded">删除</button>';
                    }
                    topBtns += '<button type="button" onclick="markDelivered(' + s.id + ')" class="px-3 py-1.5 bg-emerald-600 text-white text-xs rounded">标记已送货</button>';

                    cards += '<div class="delivery-mobile-card ' + (carry ? 'delivery-mobile-card--carry' : '') + '">';
                    cards += '<div class="flex items-start justify-between gap-2 mb-1.5">';
                    cards += '<div><p class="delivery-mobile-title">' + s.name + '</p><p class="text-xs text-slate-500">' + (s.contact || '-') + ' ' + (s.phone || '') + '</p><p class="text-xs ' + (carry ? 'text-red-600' : 'text-slate-500') + '">' + carryTxt + '</p></div>';
                    cards += '<div class="flex flex-col gap-1.5">' + topBtns + '</div>';
                    cards += '</div>';
                    cards += '<div class="grid grid-cols-2 gap-1.5 mb-1.5">';
                    cards += '<div><label class="text-xs text-slate-500">微信</label><input type="number" inputmode="decimal" value="' + (s.wechatAmount || '') + '" onchange="updatePayment(' + s.id + ', \'wechatAmount\', this.value)" class="w-full px-2 py-1.5 border rounded text-sm"></div>';
                    cards += '<div><label class="text-xs text-slate-500">支付宝</label><input type="number" inputmode="decimal" value="' + (s.alipayAmount || '') + '" onchange="updatePayment(' + s.id + ', \'alipayAmount\', this.value)" class="w-full px-2 py-1.5 border rounded text-sm"></div>';
                    cards += '<div><label class="text-xs text-slate-500">信用卡</label><input type="number" inputmode="decimal" value="' + (s.cardAmount || '') + '" onchange="updatePayment(' + s.id + ', \'cardAmount\', this.value)" class="w-full px-2 py-1.5 border rounded text-sm"></div>';
                    cards += '<div><label class="text-xs text-slate-500">现金</label><input type="number" inputmode="decimal" value="' + (s.cashAmount || '') + '" onchange="updatePayment(' + s.id + ', \'cashAmount\', this.value)" class="w-full px-2 py-1.5 border rounded text-sm"></div>';
                    cards += '</div>';
                    cards += '<div class="grid grid-cols-2 gap-1.5">';
                    cards += '<div class="border rounded p-1.5"><label class="text-xs inline-flex items-center gap-1"><input type="checkbox"' + (s.isOwing ? ' checked' : '') + ' onchange="toggleOwing(' + s.id + ', this.checked)">欠账</label>';
                    if (s.isOwing) {
                        cards += '<input type="number" value="' + (s.amount || '') + '" onchange="updateOwingAmount(' + s.id + ', this.value)" class="w-full mt-1 px-1.5 py-1 border rounded text-xs" placeholder="欠账金额">';
                    }
                    cards += '</div>';
                    cards += '<div class="border rounded p-1.5"><label class="text-xs inline-flex items-center gap-1"><input type="checkbox"' + (s.isTransfer ? ' checked' : '') + ' onchange="toggleTransfer(' + s.id + ', this.checked)">待转</label>';
                    if (s.isTransfer) {
                        cards += '<input type="number" value="' + (s.transferAmount || '') + '" onchange="updateTransferAmount(' + s.id + ', this.value)" class="w-full mt-1 px-1.5 py-1 border rounded text-xs" placeholder="待转金额">';
                    }
                    cards += '</div>';
                    cards += '</div>';
                    cards += '<div class="text-right mt-1.5 text-xs text-cyan-700 font-semibold">合计：¥' + getTotal(s) + '</div>';
                    cards += '</div>';
                }
                listEl.innerHTML = cards;
                return;
            }

            var rows = '';
            for (var i = 0; i < stores.length; i++) {
                var store = stores[i];
                var createdDay = store.createdAt ? String(store.createdAt).slice(0, 10) : '';
                var isCarryOver = !!(createdDay && createdDay < viewDay);
                var rowClass = isCarryOver ? ' class="is-alert"' : '';
                var statusText = isCarryOver ? ('跨日未送（' + createdDay + '）') : '当日';
                var actions = '';
                if (!isHistory) {
                    actions += '<button type="button" onclick="deleteDeliveryMerchant(' + store.id + ')" class="px-2 py-1 bg-red-500 text-white text-xs rounded">删</button> ';
                }
                actions += '<button type="button" onclick="markDelivered(' + store.id + ')" class="px-2 py-1 bg-emerald-600 text-white text-xs rounded">已送货</button>';
                rows += '<tr' + rowClass + '>';
                rows += '<td>' + store.name + '</td>';
                rows += '<td>' + (store.contact || '-') + '</td>';
                rows += '<td>' + (store.phone || '-') + '</td>';
                rows += '<td>' + statusText + '</td>';

                rows += '<td><input type="number" inputmode="decimal" value="' + (store.alipayAmount || '') + '" onchange="updatePayment(' + store.id + ', \'alipayAmount\', this.value)" class="w-24 px-2 py-1 border rounded"></td>';
                rows += '<td><input type="number" inputmode="decimal" value="' + (store.cardAmount || '') + '" onchange="updatePayment(' + store.id + ', \'cardAmount\', this.value)" class="w-24 px-2 py-1 border rounded"></td>';

                rows += '</tr>';

        function renderDeliverySummary(stores) {
            var el = document.getElementById('deliverySummary');
            if (!el) return;
            var totalCount = stores.length;
            var carryCount = 0;
            var totalAmount = 0;
            for (var i = 0; i < stores.length; i++) {
                var s = stores[i];
                var createdDay = s.createdAt ? String(s.createdAt).slice(0, 10) : '';
                var viewDay = isHistory ? selectedDate : todayStr;
                if (createdDay && createdDay < viewDay) carryCount++;
                totalAmount += parseFloat(getTotal(s)) || 0;
            }
            el.innerHTML =
                '<div class="delivery-kpi__item"><div class="delivery-kpi__label">待送商家</div><div class="delivery-kpi__value">' + totalCount + '</div></div>' +
                '<div class="delivery-kpi__item"><div class="delivery-kpi__label">跨日未送</div><div class="delivery-kpi__value" style="color:#dc2626">' + carryCount + '</div></div>' +
                '<div class="delivery-kpi__item"><div class="delivery-kpi__label">当前录入合计</div><div class="delivery-kpi__value" style="color:#0f766e">¥' + totalAmount.toFixed(2) + '</div></div>';
        }

        function deleteDeliveryMerchant(id) {
            if (isHistory) return showHistoryReadonlyMessage();
            if (!confirm('确定从送货列表中删除该商家？删除后不可恢复。')) return;
            fetch(API_BASE_URL + '/merchants/' + id, { method: 'DELETE' })
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    Mian1.showToast('已删除', 'success');
                    loadDeliveryStores();
                })
                .catch(function(err) {
                    console.error('deleteDeliveryMerchant:', err);

                });
        }

        function getTotal(store) {
            var total = (parseFloat(store.wechatAmount) || 0) + 
                         (parseFloat(store.alipayAmount) || 0) + 
                         (parseFloat(store.cardAmount) || 0) + 
                         (parseFloat(store.cashAmount) || 0);
            return total.toFixed(2);
        }

        function updatePayment(id, field, value) {
            if (isHistory) return showHistoryReadonlyMessage();
            getStores().then(function(stores) {
                var store = stores.find(function(s) {
                    return s.id === id;
                });
                if (store) {
                    var data = {};
                    for (var key in store) {
                        data[key] = store[key];
                    }
                    data[field] = parseFloat(value) || 0;
                    putMerchantAndReload(id, data, false).catch(function(error) {
                        console.error('Error updating payment:', error);
                    });
                }
            }).catch(function(error) {
                console.error('Error updating payment:', error);
            });
        }

        function markDelivered(id) {
            if (isHistory) return showHistoryReadonlyMessage();
            getStores().then(function(stores) {
                var store = stores.find(function(s) {
                    return s.id === id;
                });
                if (!store) return;
                
                var now = new Date().toISOString().split('T')[0];
                var data = {};
                for (var key in store) {
                    data[key] = store[key];
                }
                data.delivered = 1;
                data.deliveryDate = now;
                data.needDelivery = false;
                
                putMerchantAndReload(id, data, true).catch(function(error) {
                    console.error('Error marking delivered:', error);
                });
            }).catch(function(error) {
                console.error('Error marking delivered:', error);
            });
        }

        function addDeliveryStore() {
            if (isHistory) return showHistoryReadonlyMessage();
            try {
                var batchNames = document.getElementById('batchAddNames').value.trim();
                var batchContacts = document.getElementById('batchAddContacts').value.trim();
                var batchPhones = document.getElementById('batchAddPhones').value.trim();
                var singleName = document.getElementById('addName').value.trim();
                
                if (!batchNames && !singleName) {
                    alert('请输入商家名称');
                    return;
                }

                var defaultContact = document.getElementById('addContact').value.trim();
                var defaultPhone = document.getElementById('addPhone').value.trim();
                
                if (batchNames) {
                    // 批量添加
                    var names = batchNames.split('\n').filter(function(name) {
                        return name.trim();
                    });
                    var contacts = batchContacts ? batchContacts.split('\n') : [];
                    var phones = batchPhones ? batchPhones.split('\n') : [];
                    
                    var promises = [];
                    for (var i = 0; i < names.length; i++) {
                        var storeName = names[i].trim();
                        var storeContact = contacts[i] ? contacts[i].trim() : defaultContact;
                        var storePhone = phones[i] ? phones[i].trim() : defaultPhone;
                        
                        var now = new Date().toISOString().split('T')[0];
                        var data = {
                            name: storeName,
                            contact: storeContact,
                            phone: storePhone,
                            remark: '',
                            area: currentArea,
                            needDelivery: true,
                            delivered: 0,
                            isTemp: true,
                            createdAt: now
                        };
                        
                        promises.push(fetch(API_BASE_URL + '/merchants', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        }));
                    }
                    
                    Promise.all(promises).then(function(responses) {
                        var allOk = true;
                        for (var j = 0; j < responses.length; j++) {
                            if (!responses[j].ok) {
                                allOk = false;
                                break;
                            }
                        }
                        if (!allOk) {
                            Mian1.showToast('部分或全部添加失败，请检查网络与后端', 'error');
                            return;
                        }
                        Mian1.showToast('添加成功', 'success');
                        closeAddModal();
                        loadDeliveryStores();
                    }).catch(function(error) {
                        console.error('Error adding delivery store:', error);
                        Mian1.showToast('添加商家失败，请检查网络与后端后重试', 'error');
                    });
                } else {
                    // 单个添加
                    var now = new Date().toISOString().split('T')[0];
                    var data = {
                        name: singleName,
                        contact: defaultContact,
                        phone: defaultPhone,
                        remark: '',
                        area: currentArea,
                        needDelivery: true,
                        delivered: 0,
                        isTemp: true,
                        createdAt: now
                    };

                    fetch(API_BASE_URL + '/merchants', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    }).then(function(res) {
                        if (!res.ok) {
                            Mian1.showToast('添加失败，请检查网络与后端后重试', 'error');
                            return;
                        }
                        Mian1.showToast('添加成功', 'success');
                        closeAddModal();
                        loadDeliveryStores();
                    }).catch(function(error) {
                        console.error('Error adding delivery store:', error);
                        Mian1.showToast('添加商家失败，请检查网络与后端后重试', 'error');
                    });
                }
            } catch (error) {
                console.error('Error adding delivery store:', error);
                Mian1.showToast('添加商家失败，请检查网络与后端后重试', 'error');
            }
        }
